[package]
name = "micro-expert-router"
version = "0.1.0"
edition = "2021"
description = "MoE execution engine that streams experts from NVMe into RAM via io_uring + O_DIRECT"
license = "MIT OR Apache-2.0"

[dependencies]
# Async io_uring wrapper used for the NVMe hot path on Linux.
# rio is small and pragmatic; for production you'd consider `tokio-uring` or
# the raw `io-uring` crate with registered fixed buffers + SQPOLL. See README.
rio = "0.9"

# Tokio drives the orchestration (scheduling, prefetch tasks, channels).
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }

# Fixed-capacity LRU cache for resident experts.
lru = "0.12"

# Sync primitive for the LRU + buffer pool. parking_lot is faster and not async,
# which is exactly what we want around a short critical section.
parking_lot = "0.12"

# CLI and structured logging.
clap = { version = "4.4", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Mocked router needs a weighted distribution.
rand = "0.8"

# O_DIRECT, posix_memalign, fadvise.
libc = "0.2"

# Histogram for percentile latency reporting.
hdrhistogram = "7.5"

[profile.release]
lto = "thin"
codegen-units = 1
debug = 1
