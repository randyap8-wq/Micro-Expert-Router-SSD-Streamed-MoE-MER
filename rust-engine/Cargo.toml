[package]
name = "micro-expert-router"
version = "0.1.0"
edition = "2021"

[dependencies]
# High-performance io_uring wrapper
rio = "0.9"
# Async runtime (minimal for I/O orchestration)
tokio = { version = "1", features = ["full"] }
# Concurrent hash map for cache lookups
dashmap = "5.5"
# LRU Cache implementation
lru = "0.12"
# CLI and logging
clap = { version = "4.4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
# Randomness for mocked router
rand = "0.8"
# Performance measurement
parking_lot = "0.12"
futures = "0.3"
