# Example TOML configuration for `micro-expert-router serve`.
#
# Run:
#   cargo run --release -p micro-expert-router -- serve --config config.toml
#
# The server reads this file at startup and exposes the OpenAI-compatible
# HTTP API plus Prometheus metrics. Engine settings (cache slots, O_DIRECT
# alignment, predictive prefetch fanout, …) match what the legacy `run`
# subcommand exposes, but driven from one place instead of a long-tail of
# CLI flags.
#
# All sections are required except `[tokenizer]`, which falls back to a
# byte-level tokenizer when omitted.

[server]
# Address to listen on. `0.0.0.0:8080` to expose to the network.
bind = "0.0.0.0:8080"
# Hard cap on the `max_tokens` any single request can ask for. Requests
# asking for more are silently clamped to this value.
max_tokens = 256
# Idle TTL (seconds) for KV-cache sessions. `0` (default) disables the
# session store entirely — every request is fully stateless. When > 0,
# requests that include `"session_id": "<id>"` resume from the saved
# per-layer KV cache (multi-turn chat without re-running attention over
# the entire history), and a background task evicts sessions that
# haven't been touched in this many seconds. Use the
# `DELETE /v1/sessions/{id}` endpoint to purge a session explicitly.
session_ttl_secs = 0
# Maximum number of HTTP requests allowed to be executing concurrently.
# Excess requests are rejected with `503 Service Unavailable` so the
# engine never silently degrades into unbounded queueing. `0` (default)
# disables the limit.
max_concurrent_requests = 0
# Minimum number of free blocks the paged-KV pool must hold for a new
# request to be admitted. Requires `[real_transformer]` to also be
# configured with a block pool. `0` (default) disables.
admission_min_free_blocks = 0

# Optional API-key gate + simple in-process rate limiting. The whole
# section is optional; when omitted (or when `api_keys` is empty) the
# server runs with no auth, matching the legacy behaviour. See
# `docs/production.md` for the recommended production shape (terminate
# TLS at a reverse proxy, plumb in distinct keys per tenant).
# [security]
# Bearer / `X-API-Key` values that may access the API. Requests
# missing or carrying a value not in this set are rejected `401`.
# api_keys = ["secret-key-1", "secret-key-2"]
# In-process token-bucket rate limit, requests per second per key.
# `0` (default) disables. Bursts of up to `rate_limit_burst` are
# allowed before the bucket empties.
# rate_limit_rps = 0
# Burst size for the token bucket. `0` defaults to `rate_limit_rps`.
# rate_limit_burst = 0
# Paths to PEM-encoded TLS cert/key. This release does *not* link
# rustls into the binary; setting these logs a `WARN` and the server
# continues to bind plain HTTP. Setting only one of the two is a hard
# validation error.
# tls_cert = "/etc/mer/tls/cert.pem"
# tls_key = "/etc/mer/tls/key.pem"

[sampling]
# Server-wide defaults for the next-token sampler. Each request can
# override any of these via the OpenAI-style JSON fields
# (`temperature`, `top_p`, `top_k`, `seed`).
#
# `temperature = 0.0` (or any non-positive value) forces greedy
# `argmax` sampling — bit-for-bit reproducible regardless of the other
# knobs. This matches how OpenAI / vLLM treat "deterministic"
# sampling, and is the right default for benchmarks / regression tests
# where every change to throughput should leave the output text
# unchanged.
temperature = 0.0
# Nucleus (top-P) cumulative-mass cutoff. `1.0` disables the
# truncation; `0.9` keeps the smallest set of tokens whose cumulative
# softmax probability is `>= 0.9`.
top_p = 1.0
# Top-K truncation. `0` disables; combined with `top_p`, the more
# restrictive of the two takes effect.
top_k = 0
# Sampling RNG seed. Combined with the absolute token position via
# splitmix64, so the same `(prompt, seed, max_tokens)` triple produces
# the same completion bit-for-bit even at `temperature > 0`.
seed = 0

[model]
# Directory containing `expert_<id>.bin` files (and optionally
# `metadata.json` written by `scripts/extract_mixtral_experts.py`).
data_dir = "./data"
# Number of experts in the (per-layer) MoE pool. For Mixtral 8x7B: 8.
num_experts = 8
# Top-K experts activated per token. For Mixtral 8x7B: 2.
top_k = 2
# Hidden / residual-stream dimension. For Mixtral 8x7B: 4096.
d_model = 512
# FFN intermediate dimension. For Mixtral 8x7B: 14336.
d_ff = 2048
# Bytes per expert file on disk. Must be a multiple of `block_align`.
# For Mixtral 8x7B (d_model=4096, d_ff=14336, fp32) you'd compute:
#   3 * 4096 * 14336 * 4 = 704_643_072 bytes, padded up to 4096.
expert_size = 16777216
# Number of transformer layers. 1 for the legacy single-layer benchmark
# data; 32 for full Mixtral-8x7B.
num_layers = 1
# On-disk weight dtype: "f32" (4 B/weight, default, legacy), "f16"
# (2 B/weight), "int8" (1 B/weight + per-tensor scales), "q4k" (Q4_K_M
# 256-block, GGUF-compatible 4-bit), or "q4_0" (Q4_0 32-block, 4-bit).
# Lower-precision dtypes halve/quarter SSD bytes per expert read, the
# dominant energy term in this engine. Must match what
# `extract_mixtral_experts.py` / `gguf-convert` / `gen-data` was invoked
# with.
dtype = "f32"

[storage]
# LRU cache slots (per layer). The whole point of this engine is that
# experts stream from SSD; a large cache hides the metric you're trying
# to measure. Recommended: 4-8.
cache_slots = 4
# O_DIRECT block alignment, bytes. 4096 on most NVMe drives.
block_align = 4096
# Set to `true` on tmpfs / overlayfs / macOS / CI where O_DIRECT is
# unavailable. Buffered reads will let the OS page cache warm up,
# under-reporting cold-read SSD latency.
no_direct = false
# Predictive prefetcher fanout (0 disables prefetching entirely).
predict_fanout = 2
# Look-ahead pipeline depth: how many MoE layers ahead the speculator
# prefetches (the sliding window `layer + 1 ..= layer + pipeline_depth`),
# hiding cold SSD reads behind compute. Set to roughly
# ceil(io_latency / compute_latency) — 3 buries a ~206 ms read under
# ~231 ms of compute. 1 reproduces the legacy single-layer look-ahead.
# Also scales the shadow buffer-pool budget (predict_fanout * pipeline_depth).
pipeline_depth = 3
# Don't issue prefetches whose Markov-predicted probability falls below
# this threshold.
predict_min_prob = 0.05
# Fraction of input dimensions to load per expert with partial column
# loading. 1.0 (default) disables it; values in [0.1, 1.0) trade a small
# amount of accuracy for proportionally less compute / dequant energy.
partial_load_fraction = 1.0
# After an expert has been observed in routing this many times, pin it
# permanently in the LRU cache so it is never evicted by cold experts.
# 0 (default) disables frequency-based pinning.
pin_after_observations = 0

[tokenizer]
# Path to a HuggingFace `tokenizer.json` (e.g. the one shipped with
# Mixtral). Comment out / delete to use the byte-level fallback.
# path = "./data/tokenizer.json"

# Real transformer pipeline. When `enabled = false`
# (the default), the server uses the legacy benchmark generator and
# synthesises next-token ids from `Engine::generate` cycle stats — the
# SSD-streaming substrate is exercised identically. When `enabled =
# true`, requests run the full decoder forward (`embedding -> stacked
# layers (each with SSD-streamed MoE) -> LM head -> sample`) and the
# response text is sampled from real logits.
[real_transformer]
enabled = false
# Optional directory of pre-extracted dense weight files. See
# `RealModel::from_dir` in `src/model.rs` for the file-name schema
# (`embed.bin`, `attn_<L>_q.bin`, `gate_<L>.bin`, …). Tensors not
# present fall back to a deterministic seeded init.
# weights_dir = "./data/dense"
# Optional model-family override (exact Hugging Face `model_type`):
#   "mixtral" | "qwen3" | "qwen3_moe" | "deepseek_v3" | "mistral3" | "phi3"
# When omitted, the architecture AND all hyperparameters (num_layers,
# num_experts, d_model, d_ff, heads, head_dim, rope, …) are auto-detected
# from a `config.json` in `weights_dir`, overriding the [model] values
# below so the engine and the model stay consistent. An unrecognised value
# is a hard error; DeepSeek-V3 loads its names but fails loud (MLA + FP8
# are unimplemented). See README "Supported model architectures".
# architecture = "qwen3_moe"
# Vocab size. Must match the tokenizer (256 for the byte fallback).
vocab_size = 256
# Attention head count. For Mixtral 8x7B: 32.
num_heads = 8
# Grouped-Query-Attention KV head count. 0 = auto (set equal to
# num_heads, recovering vanilla MHA). For Mixtral 8x7B: 8.
num_kv_heads = 0
# Per-head dimension. 0 = auto (d_model / num_heads).
head_dim = 0
# RoPE base θ. Mixtral / Llama-3 default 10000; Llama-3.1 long-ctx 500000.
rope_base = 10000.0
# RMSNorm epsilon.
rms_eps = 1e-6
# PRNG seed for the deterministic-init fallback (used for any tensor
# missing from `weights_dir`). 12648430 == 0xC0FFEE; matches the
# `default_seed()` constant in `src/config.rs` (TOML doesn't accept
# hex literals).
seed = 12648430
# Continuous batching: maximum number of concurrent in-flight requests
# fused into a single decoder step. The scheduler waits up to
# `batch_timeout_ms` for additional requests before flushing the
# current batch. Set to 1 to disable batching.
max_batch_size = 8
# Continuous batching: how long the scheduler waits for additional
# requests to join a not-yet-full batch, in milliseconds. Trades a
# small amount of per-token latency for substantially better
# throughput under concurrent load.
batch_timeout_ms = 5

# Predictive Architecture (the "Omniscient" upgrade). Three opt-in
# components feed the speculative-I/O union-fetch `E = S ∪ L ∪ M`:
#   * S: the existing Markov-chain `PredictiveLoader` (always on; see
#     `[storage] predict_fanout`).
#   * L: a sliding-window `LocalityMonitor` whose hot set is also pinned
#     in the expert cache for as long as it stays hot.
#   * M: a 2-layer `NeuralSpeculator` (MLP) trained online against the
#     gate's actual top-K decision via SGD.
#
# Telemetry: `mer_locality_hits/misses_total`,
# `mer_speculator_hits/misses_total`, and `mer_ssd_stall_seconds` are
# exported on `/metrics` as soon as the corresponding component is
# enabled. With everything disabled (the default) the engine runs the
# legacy Markov-chain prefetch path bit-for-bit.
[predictive]
locality_enabled = false
# Sliding window size, in routing observations. Larger = smoother heat
# map, slower to react to topic changes.
locality_window = 256
# Heat threshold: an expert is "hot" once its observation count crosses
# `locality_threshold_pct * locality_window`. 0.10 ≈ "appeared in 10%
# of recent activations".
locality_threshold_pct = 0.10
speculator_enabled = false
# Hidden dimension of the speculator's 2-layer MLP. 128 is the spec
# recommendation; smaller = faster predict + train, less capacity.
speculator_hidden_dim = 128
# Top-K experts pulled from the speculator each routing step. 0 ⇒
# inherit `model.top_k`.
speculator_top_k = 0
# -- Per-layer expert-affinity arm (co-occurrence prefetch) ----------
# Tracks which experts co-fire inside the same MoE layer and folds
# their co-fired + disk-adjacent neighbours into the prefetch union.
# Only effective on the layer-qualified `moe_step` path.
affinity_enabled = false
# Co-fired neighbours pulled per high-confidence seed.
affinity_neighbors_k = 4
# Cumulative observations between background decay sweeps of the
# co-occurrence counters (larger = slower aging).
affinity_decay_epoch = 100000

# -- Tier 4: adaptive prefetch governor ------------------------------
# Throttle speculative prefetches by measured precision (consumed /
# completed) and foreground-read contention, so low-value speculation
# can't inflate the latency of the foreground misses that actually
# block token generation. This is the highest-leverage knob on a
# bandwidth-bound SSD (a saturated NVMe queue inflates foreground miss
# latency several-fold). Off by default (legacy unbounded admission).
prefetch_governor = false
# Precision floor / optimistic EWMA seed for the governor, in [0, 1].
# The governor never lets the effective precision multiplier fall
# below this, so a cold predictor still gets a small admission budget.
prefetch_precision_floor = 0.05
# Per-outstanding-foreground-read multiplier on the governor's
# admission threshold. Higher ⇒ speculation backs off harder while
# real misses are in flight.
prefetch_contention_weight = 1.0

# -- Tier 4: cost-aware eviction -------------------------------------
# Evict the coldest resident by decaying heat score instead of strict
# LRU, so a genuinely hot expert that briefly fell to the LRU tail is
# not dumped ahead of a one-shot cold expert. Off by default (LRU).
cost_aware_eviction = false

# -- Tier 3: per-layer pre-gate predictor ----------------------------
# Train an online conditional map from one layer's routed expert set
# to the next layer's experts and drive high-precision next-layer
# prefetch from it (real-transformer / trace-replay path). Off by
# default.
pregate_enabled = false

# -- Tier 1: skew-aware static residency -----------------------------
# Pin the hottest `fraction` of the expert namespace permanently in
# the RAM cache so a *skewed* routing distribution can exceed the bare
# cache-capacity hit-rate ceiling (the "C/E wall"). 0.0 (default)
# disables it; a value in (0, 1] pins ceil(fraction * num_experts)
# experts. Has no benefit on a uniform-i.i.d. workload.
static_residency_fraction = 0.0
# Tokens to observe before deriving the *online* hot set from live
# route counts. Ignored when `static_residency_profile` is set.
static_residency_warmup_tokens = 0
# Optional path to an offline popularity profile ({ "<id>": <count> }
# JSON, e.g. from a previous run's `--profile-out`). When set, its
# hottest `fraction` is pinned at startup for an immediately warm
# cache instead of deriving the hot set online.
# static_residency_profile = "hot_experts.json"

# 3-tier heterogeneous memory cache (SSD → RAM → VRAM).
#
# When `enabled = false` (the default), the engine runs the legacy
# 2-tier (SSD → RAM) path bit-for-bit. When `enabled = true`, hot
# experts are promoted from the RAM-resident `ExpertCache` into an
# Anchor + LRU-Edge VRAM cache (`GpuExpertCache`) on a background
# tokio task, exposed via:
#   * `mer_vram_used_bytes` / `mer_vram_capacity_bytes` gauges
#   * `mer_gpu_cache_hits_total` / `mer_gpu_cache_misses_total`
#   * `mer_promotions_total` counter
#   * extended `/v1/admin/health/experts` JSON
#
# On CPU-only builds (no `cuda` feature) the VRAM tier is emulated
# host-side and inference still runs through the existing CPU path —
# the cache only changes *where the bytes live*, not how they are
# computed. With `--features cuda`, `run_inference_gpu` dispatches
# the matmul through candle-core's CUDA backend.
[gpu_cache]
enabled = false
# VRAM budget in MiB. 0 ⇒ cache created with zero capacity, every
# lookup misses through to RAM. Leave headroom for the dense body
# and KV cache; a 16 GiB card typically uses 4096–8192 here.
vram_capacity_mb = 0
# Hit count an expert must accumulate in RAM before it is pinned
# into the Anchor Core. 0 disables promotion (LRU Edge only).
promote_after_hits = 16
# Fraction of VRAM reserved for the Anchor Core; the remainder is
# the LRU Edge. 0.0..=1.0.
vram_anchor_ratio = 0.5
# On-device dtype for resident bytes: "f32", "f16", "int8", "q4k",
# "q4_0", "q8_0". "f16" typically halves the VRAM footprint of
# "f32" with no perceptible quality loss.
dtype = "f16"

# -- Distributed expert partitioning (multi-node, optional) ----------
#
# Off by default (single-node; every expert local). When enabled, the
# expert id space is hash-partitioned across `nodes` with the
# documented `id % nodes.len()` scheme (see docs/distributed.md): ids
# owned by `nodes[self_index]` stay on the local NVMe path, every
# other id is routed to its owning peer. The batch scheduler's warm
# pre-pass consults this placement so remote ids are fetched over the
# gRPC shard transport (build with `--features grpc`) and surface
# structured failures instead of redundant local SSD reads.
[distributed]
enabled = false
# Every node in the mesh, in shard order ("host:port").
nodes = []
# This process's position in `nodes`.
self_index = 0
# Per-call deadline for remote expert fetches (milliseconds).
remote_fetch_timeout_ms = 250
