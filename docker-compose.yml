# --------------------------------------------------------------------
# docker-compose.yml — minimal "small / medium business" deployment of
# the SSD-streamed MoE engine.
#
# Layout:
#   - Service `mer`: the engine itself, listening on :8080 and serving
#     the OpenAI-compatible `/v1/completions`, `/v1/chat/completions`,
#     and Prometheus `/metrics` endpoints.
#   - Volume `./data` (host) → `/data` (container) holds the
#     `expert_<id>.bin` files plus `metadata.json` and (optionally)
#     `tokenizer.json`.
#   - Volume `./config.toml` (host) → `/etc/mer/config.toml`
#     (container) overrides the baked-in default.
#
# Bring up:
#   docker compose up --build
#
# Important: the shipped `config.toml` binds `127.0.0.1:8080`, which
# inside the container is *not* reachable from the published host
# port (Docker's port forwarding only sees the container's external
# interface). Before running compose, override `bind` in the
# host-mounted config:
#
#   [server]
#   bind = "0.0.0.0:8080"
#
# The same `bind` value is used by the container-internal healthcheck
# below (`curl http://127.0.0.1:8080/health`), which works regardless
# because that probe runs *inside* the container's network namespace.
#
# Smoke test (after `docker compose up`):
#   curl -sS http://localhost:8080/health
#   curl -sS -X POST http://localhost:8080/v1/completions \
#     -H 'content-type: application/json' \
#     -d '{"prompt":"Hello","max_tokens":4,"stream":true}'
# --------------------------------------------------------------------

services:
  mer:
    build:
      context: .
      args:
        # Set FEATURES="" to compile without the io_uring backend (the
        # default works on every Linux host).
        FEATURES: io_uring
    image: micro-expert-router:latest
    container_name: mer
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data:ro
      - ./config.toml:/etc/mer/config.toml:ro
    environment:
      RUST_LOG: info
    # Allow `O_DIRECT` and `io_uring` syscalls. Most distros ship a
    # default seccomp profile that already permits these, but we
    # spell it out for clarity / portability.
    security_opt:
      - seccomp=unconfined
    # If the host has a real NVMe device you want exposed to the
    # container, uncomment this and point at it. (For development
    # against a regular filesystem the bind-mount above is enough.)
    # devices:
    #   - "/dev/nvme0n1:/dev/nvme0n1"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS http://127.0.0.1:8080/health || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
